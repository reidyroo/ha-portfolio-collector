title: Investment Monitor
views:

  # ═══════════════════════════
  # View 1: Portfolio Overview
  # ═══════════════════════════
  - title: Overview
    path: overview
    icon: mdi:chart-line
    type: masonry
    cards:

      # ── Health gauge + state ──────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: gauge
            entity: sensor.portfolio_health_score
            name: Portfolio Health
            min: 0
            max: 100
            needle: true
            severity:
              red: 0
              yellow: 50
              green: 65

          - type: entity
            entity: sensor.portfolio_health_state
            name: Health State

      # ── Health breakdown: why the score is what it is ─────────────────────
      - type: markdown
        title: Health Breakdown
        content: |
          | Component | Score | Driver |
          |-----------|:-----:|--------|
          | Return Edge (35%) | **{{ states('sensor.portfolio_health_return_edge') | float | int }}**/100 | Alpha vs MSCI: {% set a = states('sensor.portfolio_alpha_msci') | float(0) %}{% if a >= 0 %}+{% endif %}{{ a | round(1) }}% |
          | Resilience (25%) | **{{ states('sensor.portfolio_health_resilience') | float | int }}**/100 | Drawdown: {{ state_attr('sensor.portfolio_value', 'drawdown_pct') | float(0) | round(1) }}% |
          | Drift Discipline (20%) | **{{ states('sensor.portfolio_health_drift_discipline') | float | int }}**/100 | {% set sn = state_attr('sensor.portfolio_snapshot', 'group_summary') %}{% if sn %}{% set ns = namespace(d=0) %}{% for g in ['momentum_core','global_beta','regional_satellite','defensive','optional_factor'] %}{% if g in sn %}{% set ns.d = ns.d + ((sn[g].actual_wt - sn[g].target_wt) | abs) %}{% endif %}{% endfor %}Group drift total: {{ ns.d | round(1) }}pp{% else %}—{% endif %} |
          | Momentum Quality (20%) | **{{ states('sensor.portfolio_health_momentum_quality') | float | int }}**/100 | Regime: {{ states('sensor.vix_regime') }} · VIX {{ states('sensor.vix_level') | float(0) | round(1) }} |

          {% set rb = states('sensor.rebalance_signal') %}{% set appr = state_attr('sensor.rebalance_signal', 'approved') %}
          {% if rb == '1' %}⚠ **Rebalance suggested** — {{ state_attr('sensor.rebalance_signal', 'rebalance_reason') }}{% endif %}
          {% if appr %} ✅ *Trades approved*{% endif %}

      # ── Portfolio summary ─────────────────────────────────────────────────
      - type: glance
        title: Portfolio Summary
        show_state: true
        show_name: true
        entities:
          - entity: sensor.portfolio_value
            name: Value (GBP)
          - entity: sensor.portfolio_return
            name: Total Return %
          - entity: sensor.portfolio_cash
            name: Free Cash
          - entity: sensor.vix_level
            name: VIX

      # ── Allocation by group ───────────────────────────────────────────────
      - type: markdown
        title: Allocation by Group
        content: |
          {% set snap = state_attr('sensor.portfolio_snapshot', 'group_summary') %}
          {% if snap %}
          | Group | Target % | Actual % | Δ |
          |-------|:--------:|:--------:|:---:|
          {% for gkey in ['momentum_core','global_beta','regional_satellite','defensive','optional_factor'] -%}
          {%- if gkey in snap -%}
          {%- set g = snap[gkey] -%}
          {%- set delta = (g.actual_wt - g.target_wt) | round(1) -%}
          | **{{ g.label }}** | {{ g.target_wt | int }} | {{ g.actual_wt | round(1) }} | {% if delta > 2 %}🔴 +{{ delta }}{% elif delta < -2 %}🟠 {{ delta }}{% else %}🟢 {{ delta }}{% endif %} |
          {% endif -%}
          {%- endfor %}
          {% else %}
          *No snapshot yet — trigger a collection.*
          {% endif %}

      # ── Group allocation donut ────────────────────────────────────────────
      - type: custom:apexcharts-card
        chart_type: donut
        header:
          show: true
          title: Portfolio Composition — by Group (actual %)
          show_states: false
        series:
          - entity: sensor.portfolio_group_weight_momentum_core
            name: Momentum Core
            color: "#FF6B35"
          - entity: sensor.portfolio_group_weight_global_beta
            name: Global Beta
            color: "#4CAF50"
          - entity: sensor.portfolio_group_weight_regional_satellite
            name: Regional Satellite
            color: "#2196F3"
          - entity: sensor.portfolio_group_weight_defensive
            name: Defensive
            color: "#9C27B0"
          - entity: sensor.portfolio_group_weight_optional_factor
            name: Optional Factor
            color: "#FF9800"
        apex_config:
          legend:
            show: true
            position: bottom
          plotOptions:
            pie:
              donut:
                size: "65%"
                labels:
                  show: true
                  total:
                    show: true
                    label: "Invested"
                    formatter: |
                      function(w) {
                        var sum = w.globals.seriesTotals.reduce(function(a, b) { return a + b; }, 0);
                        return Math.round(sum) + '%';
                      }

      # ── Portfolio value history ───────────────────────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Portfolio Value — 90 days
          show_states: true
        graph_span: 90d
        series:
          - entity: sensor.portfolio_value
            name: Portfolio (GBP)
            color: "#4CAF50"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.15

      # ── Return history (portfolio vs benchmarks) ──────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Return History — 90 days (%)
          show_states: true
        graph_span: 90d
        series:
          - entity: sensor.portfolio_return
            name: Portfolio
            color: "#4CAF50"
            stroke_width: 3
          - entity: sensor.msci_world_return_1m
            name: MSCI World
            color: "#2196F3"
            stroke_width: 2
          - entity: sensor.sp500_return_1m
            name: S&P 500
            color: "#FF9800"
            stroke_width: 2
          - entity: sensor.ftse100_return_1m
            name: FTSE 100
            color: "#9C27B0"
            stroke_width: 2
          - entity: sensor.dow_return_1m
            name: DOW
            color: "#F44336"
            stroke_width: 2


  # ═══════════════════════════════
  # View 2: Holdings & Drift
  # ═══════════════════════════════
  - title: Holdings
    path: holdings
    icon: mdi:view-list
    type: masonry
    max_columns: 2
    cards:

      # ── Holdings table ────────────────────────────────────────────────────
      - type: markdown
        title: Current Holdings
        content: |
          {% set positions = state_attr('sensor.portfolio_snapshot', 'positions') %}
          {% if positions %}
          | Group | Symbol | Actual % | Target % | Drift % | P&L % | Value £ |
          |-------|--------|:--------:|:--------:|:-------:|:-----:|--------:|
          {% for p in positions | sort(attribute='actual_wt', reverse=True) | sort(attribute='group_order') -%}
          {%- set d = p.drift_rel | float(0) | round(1) -%}
          {%- set drift_icon = '🔴' if d > 15 else '🟠' if d < -15 else '🟢' -%}
          | {{ p.group | replace('_',' ') | title }} | **{{ p.symbol }}** | {{ p.actual_wt | round(1) }} | {{ p.target_wt | int }} | {{ drift_icon }} {{ "%+.1f" | format(d) }} | {{ p.pnl_pct | round(2) }} | {{ p.market_value | round(0) | int }} |
          {% endfor %}
          *🟢 on-target · 🔴 over · 🟠 under (±15% threshold)*
          {% else %}
          *No snapshot yet — trigger a collection.*
          {% endif %}

      # ── Momentum scores ───────────────────────────────────────────────────
      - type: markdown
        title: Momentum & Signal Scores
        content: |
          {% set positions = state_attr('sensor.portfolio_snapshot', 'positions') %}
          {% set mom = state_attr('sensor.portfolio_snapshot', 'momentum') %}
          {% if mom and positions %}
          | Symbol | 12m | 6m | 3m | Trend | Signal |
          |--------|:---:|:--:|:--:|:-----:|:------:|
          {% for p in positions | sort(attribute='actual_wt', reverse=True) | sort(attribute='group_order') -%}
          {%- set m = mom[p.symbol] if p.symbol in mom else {} -%}
          | **{{ p.symbol }}** | {% if m.momentum_12m is defined and m.momentum_12m != None %}{{ m.momentum_12m | round(1) }}%{% else %}—{% endif %} | {% if m.momentum_6m is defined and m.momentum_6m != None %}{{ m.momentum_6m | round(1) }}%{% else %}—{% endif %} | {% if m.momentum_3m is defined and m.momentum_3m != None %}{{ m.momentum_3m | round(1) }}%{% else %}—{% endif %} | {{ m.trend | default('—') }} | {% if m.trend_score is defined and m.trend_score != None %}{% set ts = m.trend_score | float %}{% if ts > 0.02 %}📈{% elif ts < -0.02 %}📉{% else %}➡️{% endif %} {{ ts | round(3) }}{% else %}—{% endif %} |
          {% endfor %}
          {% else %}
          *Momentum data not available yet.*
          {% endif %}


  # ═══════════════════════════════════
  # View 3: Rebalance & Trade Approval
  # ═══════════════════════════════════
  - title: Rebalance
    path: rebalance
    icon: mdi:scale-balance
    type: masonry
    cards:

      - type: glance
        title: Status
        entities:
          - entity: sensor.rebalance_signal
            name: Rebalance Needed
          - entity: sensor.vix_regime
            name: VIX Regime
          - entity: sensor.vix_level
            name: VIX
          - entity: sensor.snapshot_age_hours
            name: Snapshot Age (h)

      # ── Active phase (compact) ─────────────────────────────────────────────
      - type: markdown
        title: Active Phase
        content: |
          {% set p = states('input_select.portfolio_phase') %}
          {% if p == 'Momentum-Max' %}**Momentum-Max** · CVaR 6.5% · Cooldown 21d · VIX gate 25
          {% elif p == 'Momentum-Chill' %}**Momentum-Chill** · CVaR 5.5% · Cooldown 21d · VIX gate 25
          {% elif p == 'Balanced Growth' %}**Balanced Growth** · CVaR 4.5% · Cooldown 21d · VIX gate 25
          {% elif p == 'Pre-Retirement' %}**Pre-Retirement** · CVaR 3.0% · Cooldown 28d · VIX gate 20
          {% else %}**{{ p }}** · custom settings active (configured in add-on options)
          {% endif %}

      - type: markdown
        title: Rebalance Reason
        content: |
          {% set reason = state_attr('sensor.rebalance_signal', 'rebalance_reason') %}
          {{ reason if reason else '*No rebalance currently suggested.*' }}

      # ── Trade plan ────────────────────────────────────────────────────────
      - type: markdown
        title: Suggested Trade Plan
        content: |
          {% set actions = state_attr('sensor.rebalance_signal', 'suggested_actions') %}
          {% if actions and actions | length > 0 %}
          | Symbol | Action | Cur % | Base Tgt % | Adj Tgt % | Delta £ | Units | |
          |--------|:------:|:-----:|:----------:|:---------:|--------:|------:|---|
          {% for a in actions -%}
          | **{{ a.symbol }}** | {{ a.action }} | {{ a.current_wt | round(1) }} | {{ a.original_target_wt }} | {{ a.target_wt | round(1) }} | {{ a.delta_value | round(0) | int }} | {{ a.delta_units }} | {% if a.balancing_trade %}⚖️{% endif %} |
          {% endfor %}
          *Base Tgt = integer target. Adj Tgt = momentum-tilted weight used for trade sizing. ⚖️ = balancing trade.*
          {% else %}
          *No trades suggested at this time.*
          {% endif %}

      # ── Controls ──────────────────────────────────────────────────────────
      - type: entities
        title: Controls
        entities:
          - entity: input_select.portfolio_phase
            name: Portfolio Phase
          - entity: input_number.portfolio_drift_threshold
            name: Drift Alert Threshold
          - entity: input_boolean.portfolio_live_mode
            name: "⚠ Live Trading Mode"
          - entity: input_boolean.portfolio_trade_approved
            name: Approve Trades (toggle to execute)

      - type: conditional
        conditions:
          - entity: input_boolean.portfolio_live_mode
            state: "on"
        card:
          type: markdown
          content: |
            ## ⚠ Live Mode Active
            Approving trades will submit **real orders** to Trading 212.
            Verify the trade plan above before toggling approval.

      # ── Risk score (dynamic mode) ─────────────────────────────────────────
      - type: entities
        title: Dynamic Risk Score
        show_header_toggle: false
        entities:
          - entity: input_number.portfolio_risk_score
            name: Risk Score (0–100)
            secondary_info: last-changed
        footer:
          type: buttons
          entities:
            - entity: input_number.portfolio_risk_score
              name: Pre-Retirement (15)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 15
            - entity: input_number.portfolio_risk_score
              name: Balanced (45)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 45
            - entity: input_number.portfolio_risk_score
              name: Chill (65)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 65
            - entity: input_number.portfolio_risk_score
              name: Max (90)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 90

      # ── Cooldown override ─────────────────────────────────────────────────
      - type: markdown
        content: |
          **Cooldown override:** allow the next snapshot to fire a rebalance
          even if the {{ state_attr('sensor.rebalance_signal', 'min_days') or 21 }}-day cooldown is still active.
          One-shot — clears automatically when consumed.

      - type: horizontal-stack
        cards:
          - type: button
            name: Notch Up — Bypass Cooldown
            icon: mdi:rocket-launch-outline
            tap_action:
              action: call-service
              service: rest_command.notch_up_cooldown
              confirmation:
                text: >
                  Allow the NEXT snapshot to fire a rebalance regardless of
                  cooldown. Useful when you want to act on a strong market
                  move without waiting. Continue?
          - type: button
            name: Cancel Notch-Up
            icon: mdi:close-circle-outline
            tap_action:
              action: call-service
              service: rest_command.cancel_notch_up

      # ── Action buttons ────────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: button
            name: Run Snapshot Now
            icon: mdi:refresh
            tap_action:
              action: call-service
              service: rest_command.trigger_portfolio_collect
              confirmation:
                text: Trigger a portfolio snapshot collection now?
          - type: button
            name: Dry Run Approval
            icon: mdi:check-outline
            tap_action:
              action: call-service
              service: rest_command.approve_rebalance_dry_run
              confirmation:
                text: Mark rebalance as approved without placing any orders?
          - type: button
            name: Reset Cooldown
            icon: mdi:timer-refresh-outline
            tap_action:
              action: call-service
              service: rest_command.reset_rebalance_cooldown
              confirmation:
                text: Clear the cooldown timer? Use after a failed execution to allow an immediate retry.

      # ── Utility buttons ───────────────────────────────────────────────────
      - type: horizontal-stack
        cards:
          - type: button
            name: Refresh Catalog
            icon: mdi:database-refresh-outline
            tap_action:
              action: call-service
              service: rest_command.refresh_instrument_catalog
              confirmation:
                text: >
                  Force a fresh catalog fetch from T212? This counts against the
                  API rate limit (1 request per 50 seconds). Only needed if new
                  instruments have been added and are not appearing in snapshots.
          - type: button
            name: Sync T212 → Targets
            icon: mdi:scale-balance
            tap_action:
              action: call-service
              service: rest_command.sync_t212_weights
              confirmation:
                text: >
                  Reset every instrument's stored target weight to its current
                  actual weight in T212. Drift will be ~0% after the next snapshot.
                  Only affects "use_group_weights=False" mode. Continue?

      # ── Pie controls ──────────────────────────────────────────────────────
      - type: conditional
        conditions:
          - entity: sensor.portfolio_value
            attribute: pie_detected
            state: true
        card:
          type: vertical-stack
          cards:
            - type: markdown
              content: |
                ### 🥧 Pie Execution
                All your positions are inside T212 pie **{{ state_attr('sensor.portfolio_value', 'pie_id') }}**.
                Direct market orders don't work for pie holdings. Approving trades
                will automatically update the pie's target shares unless
                `force_direct_orders_when_pie` is enabled.


  # ═══════════════════════════════════
  # View 4: Benchmark History
  # ═══════════════════════════════════
  - title: Benchmarks
    path: benchmarks
    icon: mdi:earth
    type: masonry
    cards:

      - type: custom:apexcharts-card
        header:
          show: true
          title: Alpha History — 90 days (%)
        graph_span: 90d
        series:
          - entity: sensor.portfolio_alpha_sp500
            name: vs S&P 500
            color: "#FF9800"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.15
          - entity: sensor.portfolio_alpha_msci
            name: vs MSCI World
            color: "#2196F3"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.15

      - type: custom:apexcharts-card
        header:
          show: true
          title: VIX — 90 days
          show_states: true
        graph_span: 90d
        series:
          - entity: sensor.vix_level
            name: VIX
            color: "#FF5722"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.1

      - type: glance
        title: Returns Since Purchase (%)
        show_state: true
        show_name: true
        entities:
          - entity: sensor.portfolio_return
            name: Portfolio
          - entity: sensor.msci_world_return_since_purchase
            name: MSCI World
          - entity: sensor.sp500_return_since_purchase
            name: S&P 500
          - entity: sensor.ftse100_return_since_purchase
            name: FTSE 100
          - entity: sensor.dow_return_since_purchase
            name: DOW


  # ═══════════════════════════════════
  # View 5: Instrument Groups
  # ═══════════════════════════════════
  - title: Groups
    path: groups
    icon: mdi:tag-multiple-outline
    type: masonry
    max_columns: 2
    cards:
      - type: markdown
        content: |
          ## Instrument Groups
          Assign each holding to a strategy group. Groups drive phase allocations
          used for rebalance target weights when `weight_mode` is anything
          other than `stored`.

          **New instruments** added to your T212 account appear here automatically
          after the next snapshot and are tagged **Unassigned** until you classify them.

      # ── Assignment form ────────────────────────────────────────────────────
      - type: entities
        title: Assign Group
        show_header_toggle: false
        state_color: false
        entities:
          - entity: input_select.portfolio_assign_instrument
            name: 1. Pick instrument
            icon: mdi:format-list-bulleted-square
          - entity: input_select.portfolio_assign_group
            name: 2. Pick group
            icon: mdi:tag-outline
          - type: section
          - type: call-service
            name: 3. Apply group assignment
            icon: mdi:content-save-check
            action_name: APPLY
            service: rest_command.assign_instrument_group

      # ── Current assignments ────────────────────────────────────────────────
      - type: markdown
        content: |
          ### Current assignments
          *(from snapshot {{ state_attr('sensor.portfolio_snapshot', 'as_of') or 'none yet' }})*

          | Group | Symbol | Actual % | Target % | Tradeable |
          |---|---|---:|---:|:---:|
          {%- set positions = state_attr('sensor.portfolio_snapshot', 'positions') or [] %}
          {%- for p in positions | sort(attribute='group_order') %}
          {%- set group_label = p.group | replace('_', ' ') | title %}
          {%- set untrade = '🚫' if p.tradeable == false else '✅' %}
          {%- if p.group == 'unassigned' %}
          | 🟡 **{{ group_label }}** | **{{ p.symbol }}** | {{ p.actual_wt | round(1) }} | {{ p.target_wt }} | {{ untrade }} |
          {%- else %}
          | {{ group_label }} | **{{ p.symbol }}** | {{ p.actual_wt | round(1) }} | {{ p.target_wt }} | {{ untrade }} |
          {%- endif %}
          {%- endfor %}

          {% set unassigned = (positions | selectattr('group', 'eq', 'unassigned') | list | length) %}
          {% if unassigned > 0 %}
          ⚠ **{{ unassigned }} instrument(s) need a group** — pick them in the dropdown above and assign.
          {% endif %}

          {% set untradeable = (positions | rejectattr('tradeable') | list | length) %}
          {% if untradeable > 0 %}
          🚫 **{{ untradeable }} instrument(s) marked untradeable** — auto-flagged after T212 persistently
          rejected orders. Re-enable via `POST /api/groups/<ticker>/tradeable {"tradeable": true}`.
          {% endif %}
