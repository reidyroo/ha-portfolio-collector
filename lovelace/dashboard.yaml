title: Investment Monitor
views:

  # ═══════════════════════════
  # View 1: Portfolio Overview
  # ═══════════════════════════
  - title: Overview
    path: overview
    icon: mdi:chart-line
    type: masonry
    cards:

      # ── Running collector version (verify add-on actually upgraded) ─────
      - type: markdown
        content: |
          **Collector:** v{{ state_attr('sensor.portfolio_value', 'collector_version') or 'unknown' }} ·
          **Phase:** {{ states('input_select.portfolio_phase') }} ·
          **Weight mode:** {{ state_attr('sensor.portfolio_value', 'weight_mode') or 'unknown' }}
          {% if state_attr('sensor.portfolio_value', 'weight_mode') == 'dynamic' %}
          · **Risk:** {{ state_attr('sensor.portfolio_value', 'risk_score') }} → effective {{ state_attr('sensor.portfolio_value', 'effective_risk') }}
          ({{ state_attr('sensor.portfolio_value', 'effective_risk_reason') }})
          {% endif %}
          · **Drawdown:** {{ state_attr('sensor.portfolio_value', 'drawdown_pct') }}%
          · **Snapshot:** {{ state_attr('sensor.portfolio_value', 'as_of') or 'none yet' }}
          {% if state_attr('sensor.portfolio_value', 'cooldown_override_used') %}

          ⚠ **Cooldown override:** {{ state_attr('sensor.portfolio_value', 'cooldown_override_reason') }}
          {% endif %}

      # ── Header: value / return / cash / VIX ──────────────────────────────
      - type: glance
        title: Portfolio Summary
        show_state: true
        show_name: true
        entities:
          - entity: sensor.portfolio_value
            name: Value (GBP)
          - entity: sensor.portfolio_return
            name: Total Return %
          - entity: sensor.portfolio_cash
            name: Free Cash
          - entity: sensor.vix_level
            name: VIX

      # ── VIX regime ────────────────────────────────────────────────────────
      - type: entity
        entity: sensor.vix_regime
        name: Market Regime

      # ── Portfolio value history ───────────────────────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: Portfolio Value — 90 days
          show_states: true
        graph_span: 90d
        series:
          - entity: sensor.portfolio_value
            name: Portfolio (GBP)
            color: "#4CAF50"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.15

      # ── Benchmark returns since purchase ─────────────────────────────────
      - type: glance
        title: Returns Since Purchase (%)
        show_state: true
        show_name: true
        entities:
          - entity: sensor.portfolio_return
            name: Portfolio
          - entity: sensor.msci_world_return_since_purchase
            name: MSCI World
          - entity: sensor.sp500_return_since_purchase
            name: S&P 500
          - entity: sensor.ftse100_return_since_purchase
            name: FTSE 100
          - entity: sensor.dow_return_since_purchase
            name: DOW

      # ── Alpha vs benchmarks since purchase ───────────────────────────────
      - type: glance
        title: Alpha vs Benchmarks (since purchase)
        show_state: true
        show_name: true
        entities:
          - entity: sensor.portfolio_alpha_sp500
            name: vs S&P 500
          - entity: sensor.portfolio_alpha_msci
            name: vs MSCI World

      # ── VIX history ───────────────────────────────────────────────────────
      - type: custom:apexcharts-card
        header:
          show: true
          title: VIX — 90 days
          show_states: true
        graph_span: 90d
        series:
          - entity: sensor.vix_level
            name: VIX
            color: "#FF5722"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.1

      # ── Freshness ─────────────────────────────────────────────────────────
      - type: entity
        entity: sensor.snapshot_age_hours
        name: Last Snapshot Age (hours)


  # ═══════════════════════════════
  # View 2: Holdings & Drift
  # ═══════════════════════════════
  - title: Holdings
    path: holdings
    icon: mdi:view-list
    type: masonry
    max_columns: 2
    cards:

      # ── Group allocation summary ────────────────────────────────────────
      - type: markdown
        title: Allocation by Group
        content: |
          {% set snap = state_attr('sensor.portfolio_snapshot', 'group_summary') %}
          {% if snap %}
          | Group | Target % | Actual % | Δ |
          |-------|:--------:|:--------:|:---:|
          {% for gkey in ['momentum_core','global_beta','regional_satellite','defensive','optional_factor'] -%}
          {%- if gkey in snap -%}
          {%- set g = snap[gkey] -%}
          {%- set delta = (g.actual_wt - g.target_wt) | round(1) -%}
          | **{{ g.label }}** | {{ g.target_wt | int }} | {{ g.actual_wt | round(1) }} | {% if delta > 2 %}🔴 +{{ delta }}{% elif delta < -2 %}🟠 {{ delta }}{% else %}🟢 {{ delta }}{% endif %} |
          {% endif -%}
          {%- endfor %}
          {% else %}
          *No snapshot yet — trigger a collection.*
          {% endif %}

      # ── Holdings table ──────────────────────────────────────────────────
      - type: markdown
        title: Current Holdings & Drift
        content: |
          {% set positions = state_attr('sensor.portfolio_snapshot', 'positions') %}
          {% if positions %}
          | Group | Symbol | Actual % | Target % | Drift % | P&L % | Value £ |
          |-------|--------|:--------:|:--------:|:-------:|:-----:|--------:|
          {% for p in positions | sort(attribute='actual_wt', reverse=True) | sort(attribute='group_order') -%}
          | {{ p.group | replace('_',' ') | title }} | **{{ p.symbol }}** | {{ p.actual_wt | round(1) }} | {{ p.target_wt | int }} | {{ p.drift_rel | round(1) }} | {{ p.pnl_pct | round(2) }} | {{ p.market_value | round(0) | int }} |
          {% endfor %}
          {% else %}
          *No snapshot yet — trigger a collection.*
          {% endif %}

      # ── Drift table ─────────────────────────────────────────────────────
      - type: markdown
        title: Relative Drift per Holding (%)
        content: |
          {% set positions = state_attr('sensor.portfolio_snapshot', 'positions') %}
          {% if positions %}
          | Symbol | Drift % | |
          |--------|--------:|:---|
          {% for p in positions | sort(attribute='actual_wt', reverse=True) | sort(attribute='group_order') -%}
          {%- set d = p.drift_rel | float | round(1) -%}
          {%- set bars = [((d | abs) / 5) | round(0, 'floor') | int, 8] | min -%}
          {%- set bs = namespace(s='') -%}{%- for _ in range(bars) -%}{%- set bs.s = bs.s ~ '■' -%}{%- endfor -%}
          | **{{ p.symbol }}** | {{ "%+.1f" | format(d) }} | {% if d > 15 %}🔴 {% elif d >= 0 %}🟢 {% elif d < -15 %}🟠 {% else %}🔵 {% endif %}{{ bs.s }} |
          {% endfor %}
          *🟢 over · 🔵 under · 🔴🟠 beyond ±15% threshold · each ■ ≈ 5%*
          {% else %}
          *No snapshot yet — trigger a collection.*
          {% endif %}

      # ── Momentum scores ─────────────────────────────────────────────────
      - type: markdown
        title: Momentum Scores
        content: |
          {% set positions = state_attr('sensor.portfolio_snapshot', 'positions') %}
          {% set mom = state_attr('sensor.portfolio_snapshot', 'momentum') %}
          {% if mom and positions %}
          | Symbol | 12m | 9m | 6m | 3m | Trend | Signal |
          |--------|:---:|:--:|:--:|:--:|:-----:|:------:|
          {% for p in positions | sort(attribute='actual_wt', reverse=True) | sort(attribute='group_order') -%}
          {%- set m = mom[p.symbol] if p.symbol in mom else {} -%}
          | **{{ p.symbol }}** | {% if m.momentum_12m is defined and m.momentum_12m != None %}{{ m.momentum_12m | round(1) }}%{% else %}—{% endif %} | {% if m.momentum_9m is defined and m.momentum_9m != None %}{{ m.momentum_9m | round(1) }}%{% else %}—{% endif %} | {% if m.momentum_6m is defined and m.momentum_6m != None %}{{ m.momentum_6m | round(1) }}%{% else %}—{% endif %} | {% if m.momentum_3m is defined and m.momentum_3m != None %}{{ m.momentum_3m | round(1) }}%{% else %}—{% endif %} | {{ m.trend | default('—') }} | {% if m.trend_score is defined and m.trend_score != None %}{% set ts = m.trend_score | float %}{% if ts > 0.02 %}📈{% elif ts < -0.02 %}📉{% else %}➡️{% endif %} {{ ts | round(3) }}{% else %}—{% endif %} |
          {% endfor %}
          {% else %}
          *Momentum data not available yet.*
          {% endif %}


  # ═══════════════════════════════════
  # View 3: Rebalance & Trade Approval
  # ═══════════════════════════════════
  - title: Rebalance
    path: rebalance
    icon: mdi:scale-balance
    type: masonry
    cards:

      - type: glance
        title: Status
        entities:
          - entity: sensor.rebalance_signal
            name: Rebalance Needed
          - entity: sensor.vix_regime
            name: VIX Regime
          - entity: sensor.vix_level
            name: VIX

      # ── Active phase summary ──────────────────────────────────────────────
      - type: markdown
        title: Active Phase Settings
        content: |
          {% set p = states('input_select.portfolio_phase') %}
          {% if p == 'Momentum-Max' %}
          **Momentum-Max** — early accumulation, maximum growth
          | Group | Target | | Setting | Value |
          |---|:---:|---|---|:---:|
          | Momentum Core | 35% | | CVaR limit | 6.5% |
          | Global Beta | 40% | | Cost filter | 0.10% |
          | Regional Satellite | 15% | | Cooldown | 21 days |
          | Defensive | 5% | | VIX high at | 25 |
          | Optional Factor | 5% | | | |
          {% elif p == 'Momentum-Chill' %}
          **Momentum-Chill** — original portfolio pattern, balanced momentum
          | Group | Target | | Setting | Value |
          |---|:---:|---|---|:---:|
          | Momentum Core | 30% | | CVaR limit | 5.5% |
          | Global Beta | 28% | | Cost filter | 0.10% |
          | Regional Satellite | 22% | | Cooldown | 21 days |
          | Defensive | 16% | | VIX high at | 25 |
          | Optional Factor | 4% | | | |
          {% elif p == 'Balanced Growth' %}
          **Balanced Growth** — mid-career, growing volatility cushion
          | Group | Target | | Setting | Value |
          |---|:---:|---|---|:---:|
          | Momentum Core | 25% | | CVaR limit | 4.5% |
          | Global Beta | 38% | | Cost filter | 0.10% |
          | Regional Satellite | 17% | | Cooldown | 21 days |
          | Defensive | 15% | | VIX high at | 25 |
          | Optional Factor | 5% | | | |
          {% elif p == 'Pre-Retirement' %}
          **Pre-Retirement** — capital preservation, bonds dominate
          | Group | Target | | Setting | Value |
          |---|:---:|---|---|:---:|
          | Momentum Core | 10% | | CVaR limit | 3.0% |
          | Global Beta | 33% | | Cost filter | 0.20% |
          | Regional Satellite | 12% | | Cooldown | 28 days |
          | Defensive | 35% | | VIX high at | 20 |
          | Optional Factor | 10% | | | |
          {% else %}
          **{{ p }}** — custom settings active (configured in add-on options)
          {% endif %}

      - type: markdown
        title: Rebalance Reason
        content: |
          {% set reason = state_attr('sensor.rebalance_signal', 'rebalance_reason') %}
          {{ reason if reason else '*No rebalance currently suggested.*' }}

      # ── Trade plan ────────────────────────────────────────────────────────
      - type: markdown
        title: Suggested Trade Plan
        content: |
          {% set actions = state_attr('sensor.rebalance_signal', 'suggested_actions') %}
          {% if actions and actions | length > 0 %}
          | Symbol | Action | Cur % | Base Tgt % | Adj Tgt % | Delta £ | Units | |
          |--------|:------:|:-----:|:----------:|:---------:|--------:|------:|---|
          {% for a in actions -%}
          | **{{ a.symbol }}** | {{ a.action }} | {{ a.current_wt | round(1) }} | {{ a.original_target_wt }} | {{ a.target_wt | round(1) }} | {{ a.delta_value | round(0) | int }} | {{ a.delta_units }} | {% if a.balancing_trade %}⚖️{% endif %} |
          {% endfor %}
          *Base Tgt = integer target. Adj Tgt = momentum-tilted weight used for trade sizing. ⚖️ = balancing trade.*
          {% else %}
          *No trades suggested at this time.*
          {% endif %}

      # ── Controls ──────────────────────────────────────────────────────────
      - type: entities
        title: Controls
        entities:
          - entity: input_select.portfolio_phase
            name: Portfolio Phase
          - entity: input_number.portfolio_drift_threshold
            name: Drift Alert Threshold
          - entity: input_boolean.portfolio_live_mode
            name: "⚠ Live Trading Mode"
          - entity: input_boolean.portfolio_trade_approved
            name: Approve Trades (toggle to execute)

      - type: conditional
        conditions:
          - entity: input_boolean.portfolio_live_mode
            state: "on"
        card:
          type: markdown
          content: |
            ## ⚠ Live Mode Active
            Approving trades will submit **real orders** to Trading 212.
            Verify the trade plan above before toggling approval.

      # ── Catalog ───────────────────────────────────────────────────────────
      - type: button
        name: Refresh Instrument Catalog
        icon: mdi:database-refresh-outline
        tap_action:
          action: call-service
          service: rest_command.refresh_instrument_catalog
          confirmation:
            text: >
              Force a fresh catalog fetch from T212? This counts against the
              API rate limit (1 request per 50 seconds). Only needed if new
              instruments have been added to your T212 account and are not
              appearing in snapshots.

      # ── Sync T212 Weights ─────────────────────────────────────────────────
      - type: button
        name: Sync T212 Weights → Targets
        icon: mdi:scale-balance
        tap_action:
          action: call-service
          service: rest_command.sync_t212_weights
          confirmation:
            text: >
              Reset every instrument's stored target weight to its current
              actual weight in T212. After the next snapshot, drift will be
              ~0% across the board and no rebalance will fire until the
              portfolio actually moves. Only affects "use_group_weights=False"
              mode. Continue?

      # ── Risk score (dynamic mode) ─────────────────────────────────────────
      - type: entities
        title: Dynamic Risk Score
        show_header_toggle: false
        entities:
          - entity: input_number.portfolio_risk_score
            name: Risk Score (0–100)
            secondary_info: last-changed
        footer:
          type: buttons
          entities:
            - entity: input_number.portfolio_risk_score
              name: Pre-Retirement (15)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 15
            - entity: input_number.portfolio_risk_score
              name: Balanced (45)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 45
            - entity: input_number.portfolio_risk_score
              name: Chill (65)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 65
            - entity: input_number.portfolio_risk_score
              name: Max (90)
              tap_action:
                action: call-service
                service: input_number.set_value
                data:
                  entity_id: input_number.portfolio_risk_score
                  value: 90

      # ── Cooldown override (notch up) ──────────────────────────────────────
      - type: markdown
        content: |
          **Cooldown override:** allow the next snapshot to fire a rebalance
          even if the {{ state_attr('sensor.rebalance_signal', 'min_days') or 21 }}-day cooldown is still active.
          Use during sharp market moves (bull run-up or bear sell-off).
          One-shot — clears automatically when consumed.

      - type: horizontal-stack
        cards:
          - type: button
            name: Notch Up — Bypass Cooldown
            icon: mdi:rocket-launch-outline
            tap_action:
              action: call-service
              service: rest_command.notch_up_cooldown
              confirmation:
                text: >
                  Allow the NEXT snapshot to fire a rebalance regardless of
                  cooldown. Useful when you want to act on a strong market
                  move without waiting. Continue?
          - type: button
            name: Cancel Notch-Up
            icon: mdi:close-circle-outline
            tap_action:
              action: call-service
              service: rest_command.cancel_notch_up

      - type: button
        name: Run Snapshot Now
        icon: mdi:refresh
        tap_action:
          action: call-service
          service: rest_command.trigger_portfolio_collect
          confirmation:
            text: Trigger a portfolio snapshot collection now?

      - type: button
        name: Approve — Dry Run (no orders)
        icon: mdi:check-outline
        tap_action:
          action: call-service
          service: rest_command.approve_rebalance_dry_run
          confirmation:
            text: Mark rebalance as approved without placing any orders?

      - type: button
        name: Reset Rebalance Cooldown
        icon: mdi:timer-refresh-outline
        tap_action:
          action: call-service
          service: rest_command.reset_rebalance_cooldown
          confirmation:
            text: Clear the cooldown timer? Use after a failed execution to allow an immediate retry.


  # ═══════════════════════════════════
  # View 4: Benchmark History
  # ═══════════════════════════════════
  - title: Benchmarks
    path: benchmarks
    icon: mdi:earth
    type: masonry
    cards:

      - type: custom:apexcharts-card
        header:
          show: true
          title: Return History — 90 days (%)
          show_states: true
        graph_span: 90d
        series:
          - entity: sensor.portfolio_return
            name: Portfolio
            color: "#4CAF50"
            stroke_width: 3
          - entity: sensor.msci_world_return_1m
            name: MSCI World
            color: "#2196F3"
            stroke_width: 2
          - entity: sensor.sp500_return_1m
            name: S&P 500
            color: "#FF9800"
            stroke_width: 2
          - entity: sensor.ftse100_return_1m
            name: FTSE 100
            color: "#9C27B0"
            stroke_width: 2
          - entity: sensor.dow_return_1m
            name: DOW
            color: "#F44336"
            stroke_width: 2

      - type: custom:apexcharts-card
        header:
          show: true
          title: Alpha History — 90 days (%)
        graph_span: 90d
        series:
          - entity: sensor.portfolio_alpha_sp500
            name: vs S&P 500
            color: "#FF9800"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.15
          - entity: sensor.portfolio_alpha_msci
            name: vs MSCI World
            color: "#2196F3"
            stroke_width: 2
            fill_raw: zero
            opacity: 0.15


  # ═══════════════════════════════════
  # View 5: Instrument Groups
  # ═══════════════════════════════════
  - title: Groups
    path: groups
    icon: mdi:tag-multiple-outline
    type: masonry
    cards:
      - type: markdown
        content: |
          ## Instrument Groups

          Assign each holding to a strategy group. Groups drive phase allocations
          used for rebalance target weights when `weight_mode` is anything
          other than `stored`.

          **New instruments** added to your T212 account appear here automatically
          after the next snapshot and are tagged **Unassigned** until you classify them.

      # ── Assignment form: pick instrument + group, click Apply ──────────────
      - type: entities
        title: Assign Group
        show_header_toggle: false
        state_color: false
        entities:
          - entity: input_select.portfolio_assign_instrument
            name: 1. Pick instrument
            icon: mdi:format-list-bulleted-square
          - entity: input_select.portfolio_assign_group
            name: 2. Pick group
            icon: mdi:tag-outline
          - type: section
          - type: call-service
            name: 3. Apply group assignment
            icon: mdi:content-save-check
            action_name: APPLY
            service: rest_command.assign_instrument_group

      # ── Run a snapshot to refresh the table below ─────────────────────────
      - type: button
        name: Run Snapshot Now (refresh table)
        icon: mdi:refresh
        tap_action:
          action: call-service
          service: rest_command.trigger_portfolio_collect

      # ── Live table of current group assignments (from latest snapshot) ────
      - type: markdown
        content: |
          ### Current assignments
          *(from snapshot {{ state_attr('sensor.portfolio_snapshot', 'as_of') or 'none yet' }})*

          | Group | Symbol | Actual % | Target % | Tradeable |
          |---|---|---:|---:|:---:|
          {%- set positions = state_attr('sensor.portfolio_snapshot', 'positions') or [] %}
          {%- for p in positions | sort(attribute='group_order') %}
          {%- set group_label = p.group | replace('_', ' ') | title %}
          {%- set untrade = '🚫' if p.tradeable == false else '✅' %}
          {%- if p.group == 'unassigned' %}
          | 🟡 **{{ group_label }}** | **{{ p.symbol }}** | {{ p.actual_wt | round(1) }} | {{ p.target_wt }} | {{ untrade }} |
          {%- else %}
          | {{ group_label }} | **{{ p.symbol }}** | {{ p.actual_wt | round(1) }} | {{ p.target_wt }} | {{ untrade }} |
          {%- endif %}
          {%- endfor %}

          {% set unassigned = (positions | selectattr('group', 'eq', 'unassigned') | list | length) %}
          {% if unassigned > 0 %}
          ⚠ **{{ unassigned }} instrument(s) need a group** — pick them in the
          dropdown above and assign.
          {% endif %}

          {% set untradeable = (positions | rejectattr('tradeable') | list | length) %}
          {% if untradeable > 0 %}
          🚫 **{{ untradeable }} instrument(s) marked untradeable** — auto-flagged
          after T212 persistently rejected orders. They appear in actuals but
          are excluded from rebalance trade plans. Re-enable manually via
          `POST /api/groups/<ticker>/tradeable {"tradeable": true}` once the
          underlying position is fixed in T212.
          {% endif %}

      - type: glance
        title: Returns Since Purchase (%)
        entities:
          - entity: sensor.msci_world_return_since_purchase
            name: MSCI World
          - entity: sensor.sp500_return_since_purchase
            name: S&P 500
          - entity: sensor.ftse100_return_since_purchase
            name: FTSE 100
          - entity: sensor.dow_return_since_purchase
            name: DOW
          - entity: sensor.vix_level
            name: VIX

      - type: glance
        title: 3-Month Returns (%)
        entities:
          - entity: sensor.msci_world_return_3m
            name: MSCI World
          - entity: sensor.sp500_return_3m
            name: S&P 500
          - entity: sensor.ftse100_return_1m
            name: FTSE 100
          - entity: sensor.dow_return_1m
            name: DOW
