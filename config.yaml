name: "Portfolio Collector"
description: >
  Trading 212 portfolio monitor — fetches live holdings directly from T212,
  tracks portfolio value and drift against group-based target weights,
  scores momentum, benchmarks against MSCI World / S&P 500 / FTSE 100 / DOW / VIX,
  and suggests rebalance trades for manual approval. No holdings list required —
  T212 is the source of truth.
version: "2.8.5"
slug: portfolio_collector
init: false
url: "https://github.com/YOUR_GITHUB_USERNAME/ha-portfolio-collector"

arch:
  - aarch64   # HA Green, HA Yellow, Raspberry Pi 4 (64-bit)
  - amd64     # x86 NUC / VM
  - armv7     # Raspberry Pi 3 / older boards

startup: application
boot: auto
host_network: true    # Required so HA core can reach port 8000 via localhost
ingress: true
ingress_port: 8000

map:
  - data:rw           # Persistent SQLite DB at /data/portfolio.db

# ── Options ── (configurable in the add-on UI) ───────────────────────────────
options:
  t212_token: ""
  t212_base: "https://demo.trading212.com"

  # Date your portfolio was first purchased (anchors benchmark comparisons)
  # Format: YYYY-MM-DD
  purchase_date: "2026-04-07"

  # Rebalance guard-rails
  drift_threshold_pct: 15
  vix_high_threshold: 25
  vix_extreme_threshold: 35
  min_days_between_rebalance: 21

  # Portfolio phase — selects a preset bundle of guard-rails and group allocations.
  # Valid values: "Momentum-Max" | "Momentum-Chill" | "Balanced Growth" | "Pre-Retirement"
  # Set to any other string (e.g. "Custom") to use the individual settings below.
  portfolio_phase: "Momentum-Chill"

  # Group-based weight derivation
  # If true, individual target weights are derived from group allocations.
  # Auto-enabled when a phase is selected via the dashboard.
  use_group_weights: false

  # CVaR (tail-risk) constraint — set to 0 to disable
  max_cvar_pct: 5.0

  # Transaction cost rate (% of trade value, e.g. 0.1 = 10bps)
  cost_rate_pct: 0.1

  # Snapshot sanity check — reject snapshot if portfolio value changes by more
  # than this % from the previous snapshot. Prevents corrupt API data being saved.
  # Set to 0 to disable.
  max_snapshot_change_pct: 20

  # Instrument catalog cache TTL in seconds (T212 rate-limits to 1 req/50s)
  catalog_cache_ttl_sec: 3600

# ── Schema ── (validation — keep in sync with options above) ─────────────────
schema:
  t212_token: str
  t212_base: str
  purchase_date: str
  drift_threshold_pct: int
  vix_high_threshold: int
  vix_extreme_threshold: int
  min_days_between_rebalance: int
  portfolio_phase: str
  use_group_weights: bool
  max_cvar_pct: float
  cost_rate_pct: float
  max_snapshot_change_pct: int
  catalog_cache_ttl_sec: int

panel_icon: mdi:chart-line
panel_title: Portfolio
