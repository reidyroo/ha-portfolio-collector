# ── Schema ── (validation — keep in sync with options above) ─────────────────
schema:
  t212_token: str
  t212_base: str
  purchase_date: str
  drift_threshold_pct: int
  vix_high_threshold: int
  vix_extreme_threshold: int
  min_days_between_rebalance: int
  portfolio_phase: str
  use_group_weights: bool
  max_cvar_pct: float
  cost_rate_pct: float
  holdings:
    - yahoo_symbol: str
      t212_ticker: str
      target_weight: float
      purchase_price: float
      purchase_qty: float
      group: str?
      instrument_name: str?

panel_icon: mdi:chart-line
panel_title: Portfolio
