name: "Portfolio Collector"
description: >
  Trading 212 portfolio monitor — fetches live holdings directly from T212,
  tracks portfolio value and drift against group-based target weights,
  scores momentum, benchmarks against MSCI World / S&P 500 / FTSE 100 / DOW / VIX,
  and suggests rebalance trades for manual approval. No holdings list required —
  T212 is the source of truth.
version: "2.7.7"
slug: portfolio_collector
init: false
url: "https://github.com/YOUR_GITHUB_USERNAME/ha-portfolio-collector"

arch:
  - aarch64   # HA Green, HA Yellow, Raspberry Pi 4 (64-bit)
  - amd64     # x86 NUC / VM
  - armv7     # Raspberry Pi 3 / older boards

startup: application
boot: auto
host_network: true    # Required so HA core can reach port 8000 via localhost
# Ingress was removed in v2.5.1 — group assignment is done entirely inside the
# HA dashboard now (see packages/portfolio.yaml).  Removing `ingress: true` and
# `ingress_port` hides the "Open Web UI" button from the add-on info page so
# users aren't tempted down a broken-by-default network path.

map:
  - data:rw           # Persistent SQLite DB at /data/portfolio.db

# ── Options ── (configurable in the add-on UI) ───────────────────────────────
options:
  t212_token: ""
  t212_base: "https://demo.trading212.com"

  # Date your portfolio was first purchased (anchors benchmark comparisons)
  # Format: YYYY-MM-DD
  purchase_date: "2026-04-07"

  # Rebalance guard-rails
  drift_threshold_pct: 15
  vix_high_threshold: 25
  vix_extreme_threshold: 35
  min_days_between_rebalance: 21

  # Portfolio phase — selects a preset bundle of guard-rails and group allocations.
  # Valid values: "Momentum-Max" | "Momentum-Chill" | "Balanced Growth" | "Pre-Retirement"
  # Set to any other string (e.g. "Custom") to use the individual settings below.
  portfolio_phase: "Momentum-Chill"

  # Target-weight derivation mode (independent of phase guard-rails):
  #   "stored"          — targets = your T212 actual weights at sync time
  #                       (drift relative to your real portfolio; zero-drift baseline)
  #   "equal_in_group"  — targets = phase group allocation / instruments-in-group
  #                       (uniform within each group)
  #   "scaled_in_group" — targets = phase group allocation, weighted by stored
  #                       within-group ratio (preserves VWRL:SSAC kind of relationships
  #                       across phase changes)
  #   "dynamic"         — group allocations interpolated along the 0–100 risk axis
  #                       from `risk_score` (with optional VIX/drawdown adjustment).
  #                       Within-group is always scaled (preserves stored ratios).
  weight_mode: "stored"

  # Risk score on a 0–100 axis (only used when weight_mode="dynamic").
  # Anchors:  Pre-Retirement=15, Balanced Growth=45, Momentum-Chill=65, Momentum-Max=90.
  # Intermediate values produce linearly-interpolated group allocations.
  risk_score: 65

  # When true, VIX and portfolio drawdown can shift the EFFECTIVE risk down
  # from your set risk_score. Caps controlled by auto_adjust_aggressiveness.
  auto_adjust_enabled: false

  # Maximum auto-shift magnitude (low=5pts, medium=10pts, high=20pts).
  auto_adjust_aggressiveness: "medium"

  # "defensive_only" — VIX/drawdown can pull effective risk DOWN only.
  # "bidirectional" — also let strong 21-day rallies push risk UP (capped at +5pts).
  auto_adjust_direction: "defensive_only"

  # Allow VIX spikes / large drawdowns to bypass the rebalance cooldown so a
  # defensive rebalance can fire during sharp market moves.
  cooldown_override_enabled: false

  # Override-trigger thresholds (defaults: vix_high+5, -15% drawdown)
  cooldown_override_vix_threshold: 30
  cooldown_override_drawdown_threshold: -15

  # Seconds to wait between the SELL leg and BUY leg of an executed rebalance,
  # so T212 can settle the freed cash before the buys hit.  5s is enough for
  # demo accounts; live accounts may want longer.  Set to 0 to disable.
  rebalance_settle_seconds: 5

  # If your entire portfolio is inside a T212 auto-invest pie, direct market
  # orders are rejected by T212 (pie holdings are non-tradeable at the
  # instrument level).  By default the collector detects this and will
  # automatically update the pie's instrumentShares on execute unless you
  # explicitly override with force_direct_orders_when_pie=true.
  force_direct_orders_when_pie: false

  # Legacy boolean — kept for backwards compatibility with older configs.
  # If weight_mode is set, this is ignored.  If weight_mode is empty, then
  # use_group_weights=true behaves like weight_mode="dynamic".
  use_group_weights: false

  # CVaR (tail-risk) constraint — set to 0 to disable
  max_cvar_pct: 5.0

  # Transaction cost rate (% of trade value, e.g. 0.1 = 10bps)
  cost_rate_pct: 0.1

  # Snapshot sanity check — reject snapshot if portfolio value changes by more
  # than this % from the previous snapshot. Prevents corrupt API data being saved.
  # Set to 0 to disable.
  max_snapshot_change_pct: 20

  # Instrument catalog cache TTL in seconds (T212 rate-limits to 1 req/50s)
  catalog_cache_ttl_sec: 3600

# ── Schema ── (validation — keep in sync with options above) ─────────────────
schema:
  t212_token: str
  t212_base: str
  purchase_date: str
  drift_threshold_pct: int
  vix_high_threshold: int
  vix_extreme_threshold: int
  min_days_between_rebalance: int
  portfolio_phase: str
  weight_mode: list(stored|equal_in_group|scaled_in_group|dynamic)?
  use_group_weights: bool?
  risk_score: int(0,100)?
  auto_adjust_enabled: bool?
  auto_adjust_aggressiveness: list(low|medium|high)?
  auto_adjust_direction: list(defensive_only|bidirectional)?
  cooldown_override_enabled: bool?
  cooldown_override_vix_threshold: float?
  cooldown_override_drawdown_threshold: float?
  rebalance_settle_seconds: float?
  force_direct_orders_when_pie: bool?
  max_cvar_pct: float
  cost_rate_pct: float
  max_snapshot_change_pct: int
  catalog_cache_ttl_sec: int

# panel_icon / panel_title also removed — they only render anything when
# ingress is enabled.  The Investment Monitor sidebar entry comes from the
# Lovelace dashboard registration in configuration.yaml instead.
