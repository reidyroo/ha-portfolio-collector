name: "Portfolio Collector"
description: >
  Trading 212 portfolio monitor — tracks up to 20 ETF/stock holdings,
  computes drift from target weights, scores momentum, benchmarks against
  MSCI World / S&P 500 / FTSE 100 / DOW / VIX, and suggests rebalance
  trades for manual approval. Demo-first: safe to use before enabling
  live execution.
version: "1.6.6"
slug: portfolio_collector
init: false
url: "https://github.com/YOUR_GITHUB_USERNAME/ha-portfolio-collector"

arch:
  - aarch64   # HA Green, HA Yellow, Raspberry Pi 4 (64-bit)
  - amd64     # x86 NUC / VM
  - armv7     # Raspberry Pi 3 / older boards

startup: application
boot: auto
host_network: true    # Required so HA core can reach port 8000 via localhost

map:
  - data:rw           # Persistent SQLite DB at /data/portfolio.db

# ── Options ── (configurable in the add-on UI) ───────────────────────────────
options:
  t212_token: ""
  t212_base: "https://demo.trading212.com"

  # Date your portfolio was first purchased (used to anchor benchmark comparisons)
  # Format: YYYY-MM-DD
  purchase_date: "2026-04-07"

  # Rebalance guard-rails
  drift_threshold_pct: 15
  vix_high_threshold: 25
  vix_extreme_threshold: 35
  min_days_between_rebalance: 21

  # Portfolio phase — selects a preset bundle of guard-rails and group allocations.
  # Valid values: "Momentum-Max" | "Momentum-Chill" | "Balanced Growth" | "Pre-Retirement"
  # Set to any other string (e.g. "Custom") to use the individual settings below.
  # The HA dashboard phase selector writes this value automatically.
  portfolio_phase: "Momentum-Max"

  # Group-based weight derivation (optional)
  # If true, individual target weights are derived from group allocations instead
  # of the per-holding target_weight values.
  use_group_weights: false

  # CVaR (tail-risk) constraint — set to 0 to disable
  # When portfolio historical CVaR exceeds this threshold (%), non-defensive
  # holdings are scaled back and weight redistributed to defensive ETFs.
  max_cvar_pct: 5.0

  # Transaction cost rate (% of trade value, e.g. 0.1 = 0.1% = 10bps)
  # Trades where expected benefit ≤ cost are skipped.
  cost_rate_pct: 0.1

  # Portfolio holdings — up to 20 entries.
  # yahoo_symbol   : Yahoo Finance ticker  (e.g. VWRL.L, ^GSPC, AAPL)
  # t212_ticker    : Trading 212 instrument ticker (find via T212 search)
  #                  Format examples: VWRL_EQ_XLON  XWEM_EQ_XETA  AAPL_US_EQ
  # target_weight  : Target allocation % (does not need to sum to 100 —
  #                  the collector normalises automatically)
  # purchase_price : Average cost basis per unit in your account currency
  # purchase_qty   : Number of units held at cost basis date
  holdings:
    - yahoo_symbol: "VWRL.L"
      t212_ticker: "VWRL_EQ_XLON"
      target_weight: 18.0
      purchase_price: 123.67
      purchase_qty: 7.278609
    - yahoo_symbol: "IWFM.L"
      t212_ticker: "IWFM_EQ_XLON"
      target_weight: 14.01
      purchase_price: 72.41
      purchase_qty: 9.671180
    - yahoo_symbol: "VAGP.L"
      t212_ticker: "VAGP_EQ_XLON"
      target_weight: 12.0
      purchase_price: 22.50
      purchase_qty: 26.666670
    - yahoo_symbol: "XDEM.L"
      t212_ticker: "XDEM_EQ_XLON"
      target_weight: 10.0
      purchase_price: 60.86
      purchase_qty: 8.214227
    - yahoo_symbol: "SSAC.L"
      t212_ticker: "SSAC_EQ_XLON"
