# ═══════════════════════════════════════════════════════════════════════════════
# Portfolio Monitor — HA package
# Loaded automatically via: homeassistant: packages: !include_dir_named packages
#
# Collector add-on runs on port 8000 on the same machine.
# ═══════════════════════════════════════════════════════════════════════════════

# Group assignment is done in the HA dashboard's "Groups" view — see the
# input_select.portfolio_assign_* helpers and rest_command.assign_instrument_group
# below.  No external URLs, no DNS / firewall accommodation needed.


# ── REST sensors — reads from collector add-on ───────────────────────────────
rest:
  - resource: http://localhost:8000/api/latest-snapshot
    scan_interval: 300
    timeout: 15
    sensor:
      - name: "Portfolio Value"
        unique_id: portfolio_value
        unit_of_measurement: "GBP"
        device_class: monetary
        value_template: "{{ value_json.portfolio_value | round(2) }}"
        json_attributes:
          - as_of
          - collector_version
          - weight_mode
          - portfolio_phase
          - risk_score
          - effective_risk
          - effective_risk_reason
          - drawdown_pct
          - dynamic_group_allocations
          - cooldown_override_used
          - cooldown_override_reason
          - portfolio_return_pct
          - invested_value
          - cash
          - rebalance_needed
          - rebalance_reason
          - approved
          - vix
          - unassigned_count

      - name: "Portfolio Return"
        unique_id: portfolio_return
        unit_of_measurement: "%"
        value_template: "{{ value_json.portfolio_return_pct | round(2) }}"

      - name: "Portfolio Cash"
        unique_id: portfolio_cash
        unit_of_measurement: "GBP"
        device_class: monetary
        value_template: "{{ value_json.cash | round(2) }}"

      - name: "Rebalance Signal"
        unique_id: rebalance_signal
        value_template: "{{ value_json.rebalance_needed | int(0) }}"
        json_attributes:
          - rebalance_reason
          - suggested_actions
          - approved
          - as_of

      - name: "VIX Level"
        unique_id: vix_level
        value_template: "{{ value_json.benchmarks.vix.latest | default(0) | round(1) }}"

      - name: "MSCI World Return 1M"
        unique_id: msci_world_return_1m
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.msci_world.return_1m | default(0) | round(2) }}"

      - name: "MSCI World Return 3M"
        unique_id: msci_world_return_3m
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.msci_world.return_3m | default(0) | round(2) }}"

      - name: "MSCI World Return Since Purchase"
        unique_id: msci_world_return_since_purchase
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.msci_world.return_since_purchase | default(0) | round(2) }}"

      - name: "SP500 Return 1M"
        unique_id: sp500_return_1m
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.sp500.return_1m | default(0) | round(2) }}"

      - name: "SP500 Return 3M"
        unique_id: sp500_return_3m
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.sp500.return_3m | default(0) | round(2) }}"

      - name: "SP500 Return Since Purchase"
        unique_id: sp500_return_since_purchase
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.sp500.return_since_purchase | default(0) | round(2) }}"

      - name: "FTSE100 Return 1M"
        unique_id: ftse100_return_1m
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.ftse_100.return_1m | default(0) | round(2) }}"

      - name: "FTSE100 Return Since Purchase"
        unique_id: ftse100_return_since_purchase
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.ftse_100.return_since_purchase | default(0) | round(2) }}"

      - name: "DOW Return 1M"
        unique_id: dow_return_1m
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.dow.return_1m | default(0) | round(2) }}"

      - name: "DOW Return Since Purchase"
        unique_id: dow_return_since_purchase
        unit_of_measurement: "%"
        value_template: "{{ value_json.benchmarks.dow.return_since_purchase | default(0) | round(2) }}"

      - name: "Portfolio Snapshot"
        unique_id: portfolio_snapshot
        value_template: "{{ value_json.as_of }}"
        json_attributes:
          - positions
          - momentum
          - drift
          - group_summary


# ── Input booleans ───────────────────────────────────────────────────────────
input_boolean:
  portfolio_trade_approved:
    name: "Approve Rebalance Trades"
    icon: mdi:check-circle-outline

  portfolio_live_mode:
    name: "Live Trading Mode"
    icon: mdi:alert
    initial: false


# ── Input selects ────────────────────────────────────────────────────────────
input_select:
  portfolio_phase:
    name: "Portfolio Phase"
    options:
      - "Momentum-Max"
      - "Momentum-Chill"
      - "Balanced Growth"
      - "Pre-Retirement"
    initial: "Momentum-Chill"
    icon: mdi:tune-variant

  # Group-assignment helpers — populated dynamically by the
  # `portfolio_refresh_instrument_dropdown` automation each time a snapshot
  # lands.  Format: "VWRL.L (VWRLl_EQ)" — friendly + canonical T212 ticker.
  portfolio_assign_instrument:
    name: "Instrument"
    options:
      - "(no snapshot yet — run one to populate)"
    icon: mdi:format-list-bulleted-square

  portfolio_assign_group:
    name: "Target group"
    options:
      - "momentum_core"
      - "global_beta"
      - "regional_satellite"
      - "defensive"
      - "optional_factor"
      - "unassigned"
    initial: "global_beta"
    icon: mdi:tag-outline


# ── Input numbers ────────────────────────────────────────────────────────────
input_number:
  portfolio_drift_threshold:
    name: "Drift Alert Threshold %"
    min: 5
    max: 40
    step: 5
    initial: 15
    unit_of_measurement: "%"
    icon: mdi:percent-outline

  portfolio_risk_score:
    name: "Risk Score (dynamic mode)"
    min: 0
    max: 100
    step: 5
    initial: 65
    icon: mdi:speedometer


# ── Template sensors ─────────────────────────────────────────────────────────
template:
  - sensor:
      - name: "VIX Regime"
        unique_id: vix_regime
        state: >
          {% set v = states('sensor.vix_level') | float(0) %}
          {% if v > 35 %}Extreme Fear
          {% elif v > 25 %}High Volatility
          {% elif v > 18 %}Elevated
          {% else %}Low Volatility{% endif %}
        icon: >
          {% set v = states('sensor.vix_level') | float(0) %}
          {% if v > 35 %}mdi:alert-circle
          {% elif v > 25 %}mdi:alert
          {% elif v > 18 %}mdi:alert-outline
          {% else %}mdi:check-circle{% endif %}

      - name: "Portfolio Alpha SP500"
        unique_id: portfolio_alpha_sp500
        unit_of_measurement: "%"
        state: >
          {{ ((states('sensor.portfolio_return') | float(0)) -
              (states('sensor.sp500_return_since_purchase') | float(0))) | round(2) }}

      - name: "Portfolio Alpha MSCI"
        unique_id: portfolio_alpha_msci
        unit_of_measurement: "%"
        state: >
          {{ ((states('sensor.portfolio_return') | float(0)) -
              (states('sensor.msci_world_return_since_purchase') | float(0))) | round(2) }}

      - name: "Snapshot Age Hours"
        unique_id: snapshot_age_hours
        unit_of_measurement: "h"
        state: >
          {% set ts = state_attr('sensor.portfolio_value', 'as_of') %}
          {% if ts %}
            {{ ((now().timestamp() - as_timestamp(ts)) / 3600) | round(1) }}
          {% else %}
            unknown
          {% endif %}


# ── REST commands ────────────────────────────────────────────────────────────
rest_command:
  trigger_portfolio_collect:
    url: "http://localhost:8000/api/collect"
    method: POST
    content_type: "application/json"
    timeout: 120

  # Always target the most recent snapshot.  Using "latest" instead of a
  # cached sensor as_of attribute avoids approving a stale plan when HA's REST
  # sensor hasn't repolled since the most recent snapshot landed.
  approve_and_execute_rebalance:
    url: >
      http://localhost:8000/api/approve/latest?execute={{
        (states('input_boolean.portfolio_live_mode') == 'on') | lower
      }}
    method: POST
    content_type: "application/json"
    timeout: 120

  approve_rebalance_dry_run:
    url: "http://localhost:8000/api/approve/latest?execute=false"
    method: POST
    content_type: "application/json"
    timeout: 30

  reset_rebalance_cooldown:
    url: "http://localhost:8000/api/reset-cooldown"
    method: POST
    content_type: "application/json"
    timeout: 10

  refresh_instrument_catalog:
    url: "http://localhost:8000/api/catalog/refresh"
    method: POST
    content_type: "application/json"
    timeout: 60

  sync_t212_weights:
    url: "http://localhost:8000/api/sync-t212-weights"
    method: POST
    content_type: "application/json"
    timeout: 60

  set_risk_score:
    url: "http://localhost:8000/api/set-risk-score"
    method: POST
    content_type: "application/json"
    payload: '{"risk_score": {{ states(''input_number.portfolio_risk_score'') | int }}}'
    timeout: 10

  notch_up_cooldown:
    url: "http://localhost:8000/api/notch-up"
    method: POST
    content_type: "application/json"
    timeout: 10

  cancel_notch_up:
    url: "http://localhost:8000/api/cancel-notch-up"
    method: POST
    content_type: "application/json"
    timeout: 10

  # Apply the group selected in the dashboard dropdowns.
  # Extracts the t212_ticker from inside the parens of the input_select option
  # (format: "VWRL.L (VWRLl_EQ)" → "VWRLl_EQ"), URL-encodes it, then POSTs
  # the chosen group label.
  assign_instrument_group:
    url: >
      http://localhost:8000/api/groups/{{
        states('input_select.portfolio_assign_instrument').split('(')[1].split(')')[0] | urlencode
      }}
    method: POST
    content_type: "application/json"
    payload: '{"group": "{{ states(''input_select.portfolio_assign_group'') }}"}'
    timeout: 10

  set_portfolio_phase:
    url: "http://localhost:8000/api/set-phase"
    method: POST
    content_type: "application/json"
    payload: '{"phase": "{{ states(''input_select.portfolio_phase'') }}"}'
    timeout: 10


# ── Automations ──────────────────────────────────────────────────────────────
automation:
  - id: portfolio_daily_collect
    alias: "Portfolio: Daily snapshot after market close"
    trigger:
      - platform: time
        at: "20:00:00"
    condition:
      - condition: time
        weekday: [mon, tue, wed, thu, fri]
    action:
      - service: rest_command.trigger_portfolio_collect
      - delay:
          seconds: 60
      - service: homeassistant.update_entity
        data:
          entity_id: sensor.portfolio_value

  - id: portfolio_rebalance_notify
    alias: "Portfolio: Notify when rebalance is suggested"
    trigger:
      - platform: state
        entity_id: sensor.rebalance_signal
        to: "1"
    action:
      - service: notify.persistent_notification
        data:
          title: "Portfolio Rebalance Suggested"
          message: >
            {{ state_attr('sensor.rebalance_signal', 'rebalance_reason') }}.
            Open the Investment Monitor dashboard to review and approve.

  - id: portfolio_execute_on_approval
    alias: "Portfolio: Execute trades when approved"
    trigger:
      - platform: state
        entity_id: input_boolean.portfolio_trade_approved
        to: "on"
    condition:
      - condition: state
        entity_id: sensor.rebalance_signal
        state: "1"
    action:
      - service: notify.persistent_notification
        data:
          title: "Rebalance: Sending orders"
          message: >
            Live mode: {{ states('input_boolean.portfolio_live_mode') }}.
            Submitting trade instructions to collector.
      - service: rest_command.approve_and_execute_rebalance
      - delay:
          seconds: 10
      - service: input_boolean.turn_off
        data:
          entity_id: input_boolean.portfolio_trade_approved
      - service: homeassistant.update_entity
        data:
          entity_id: sensor.portfolio_value

  - id: portfolio_high_vix_alert
    alias: "Portfolio: High VIX warning"
    trigger:
      - platform: numeric_state
        entity_id: sensor.vix_level
        above: 25
    action:
      - service: notify.persistent_notification
        data:
          title: "VIX Alert — {{ states('sensor.vix_level') }}"
          message: >
            Market regime: {{ states('sensor.vix_regime') }}.
            Momentum-based rebalancing is paused until VIX returns below 25.

  - id: portfolio_risk_score_change
    alias: "Portfolio: Apply risk score when slider moves"
    trigger:
      - platform: state
        entity_id: input_number.portfolio_risk_score
    condition:
      - condition: template
        value_template: >
          {{ trigger.to_state.state != trigger.from_state.state }}
    action:
      - service: rest_command.set_risk_score
      - service: notify.persistent_notification
        data:
          title: "Risk Score → {{ states('input_number.portfolio_risk_score') | int }}"
          message: >
            Effective on next snapshot. Run *Run Snapshot Now* to apply
            immediately, or wait for the daily 20:00 collect.

  - id: portfolio_cooldown_override_fired
    alias: "Portfolio: Notify when cooldown override fires"
    trigger:
      - platform: template
        value_template: >
          {{ state_attr('sensor.portfolio_value', 'cooldown_override_used') == true }}
    action:
      - service: notify.persistent_notification
        data:
          title: "Cooldown override fired"
          message: >
            {{ state_attr('sensor.portfolio_value', 'cooldown_override_reason') }}.
            Review the trade plan on the Rebalance dashboard tab.

  - id: portfolio_phase_change
    alias: "Portfolio: Apply phase settings when phase selector changes"
    trigger:
      - platform: state
        entity_id: input_select.portfolio_phase
    condition:
      - condition: template
        value_template: >
          {{ trigger.to_state.state != trigger.from_state.state }}
    action:
      - service: rest_command.set_portfolio_phase
      - service: notify.persistent_notification
        data:
          title: "Portfolio Phase → {{ states('input_select.portfolio_phase') }}"
          message: >
            Phase settings updated. Group allocations, CVaR limit, cost filter,
            cooldown, and VIX threshold have been reconfigured.
            Group weighting has been enabled automatically.
            Run a new snapshot to apply the changes to rebalance calculations.

  - id: portfolio_refresh_instrument_dropdown
    alias: "Portfolio: Refresh group-assignment dropdown options"
    trigger:
      - platform: state
        entity_id: sensor.portfolio_snapshot
      - platform: homeassistant
        event: start
    action:
      - service: input_select.set_options
        target:
          entity_id: input_select.portfolio_assign_instrument
        data:
          options: >
            {% set positions = state_attr('sensor.portfolio_snapshot', 'positions') or [] %}
            {% set ns = namespace(opts=[]) %}
            {% for p in positions | sort(attribute='symbol') %}
              {% set ns.opts = ns.opts + [p.symbol ~ ' (' ~ p.t212_ticker ~ ')'] %}
            {% endfor %}
            {{ ns.opts if ns.opts else ['(no snapshot yet — run one to populate)'] }}

  - id: portfolio_assign_instrument_done
    alias: "Portfolio: Notify after a group is applied"
    trigger:
      - platform: event
        event_type: call_service
        event_data:
          domain: rest_command
          service: assign_instrument_group
    action:
      - service: notify.persistent_notification
        data:
          title: "Group assigned"
          message: >
            {{ states('input_select.portfolio_assign_instrument') }} → {{ states('input_select.portfolio_assign_group') }}.
            Click *Run Snapshot Now* on the Groups view to refresh dashboard.

  - id: portfolio_unassigned_instruments
    alias: "Portfolio: Alert when new unassigned instruments detected"
    trigger:
      - platform: template
        value_template: >
          {{ state_attr('sensor.portfolio_value', 'unassigned_count') | int(0) > 0 }}
    action:
      - service: notify.persistent_notification
        data:
          title: "Portfolio: New instruments need group assignment"
          message: >
            {{ state_attr('sensor.portfolio_value', 'unassigned_count') }}
            instrument(s) have no group assigned. Open the Portfolio Groups
            panel in the sidebar to assign them before the next rebalance.

  - id: portfolio_collector_stale_alert
    alias: "Portfolio: Alert if snapshot is stale"
    trigger:
      - platform: numeric_state
        entity_id: sensor.snapshot_age_hours
        above: 30
    action:
      - service: notify.persistent_notification
        data:
          title: "Portfolio: Collector may be offline"
          message: >
            Last snapshot was {{ states('sensor.snapshot_age_hours') }} hours ago.
            Check the Portfolio Collector add-on is running.
